<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Forgery Detection</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; background: #f5f5f5; max-width: 600px; margin-left: auto; margin-right: auto; }
    h1 { color: #2563eb; margin-bottom: 1rem; }
    form { background: #fff; padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 1rem; }
    button { background: #2563eb; color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #1d4ed8; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <p><a href="{% url 'forgery:home' %}">← Back to Multimedia Forensics Detector</a></p>
  <h1>Audio Forgery Detection</h1>
  <p>Upload an audio file (WAV, MP3) for splicing, clipping, resampling and compression analysis.</p>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Analyze Audio</button>
  </form>
</body>
</html>
