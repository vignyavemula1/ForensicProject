<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Forgery Detection</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; background: #f5f5f5; max-width: 600px; margin-left: auto; margin-right: auto; }
      h1 { color: #222; }
      form { background: #fff; padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
      button { background: #333; color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; }
      a { color: #333; }
    </style>
  </head>
  <body>
    <p><a href="{% url 'forgery:home' %}">← Back to Multimedia Forensics Detector</a></p>
    <h1>Image Forgery Detection</h1>
    <p>Upload an image for compression, copy-move, noise and EXIF analysis.</p>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Analyze</button>
    </form>
  </body>
</html>
